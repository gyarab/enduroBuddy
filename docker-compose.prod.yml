services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: endurobuddy-redis
    restart: unless-stopped
    volumes:
      - endurobuddy_redis:/var/lib/redis/data
    networks:
      - backend
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_USE_HTTPS: "true"
    env_file:
      - .env
    command: ["sh", "-c", "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.endurobuddy-http.rule=(Host(`${TRAEFIK_HOST}`) || Host(`${TRAEFIK_APP_HOST}`)) && (PathPrefix(`/api/`) || PathPrefix(`/admin`) || PathPrefix(`/static/`) || PathPrefix(`/i18n/`) || PathPrefix(`/accounts/google/`))"
      - "traefik.http.routers.endurobuddy-http.entrypoints=web"
      - "traefik.http.routers.endurobuddy-http.priority=20"
      - "traefik.http.routers.endurobuddy-http.middlewares=endurobuddy-https-redirect"
      - "traefik.http.middlewares.endurobuddy-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.endurobuddy-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.endurobuddy.rule=(Host(`${TRAEFIK_HOST}`) || Host(`${TRAEFIK_APP_HOST}`)) && (PathPrefix(`/api/`) || PathPrefix(`/admin`) || PathPrefix(`/static/`) || PathPrefix(`/i18n/`) || PathPrefix(`/accounts/google/`))"
      - "traefik.http.routers.endurobuddy.entrypoints=websecure"
      - "traefik.http.routers.endurobuddy.tls=true"
      - "traefik.http.routers.endurobuddy.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.endurobuddy.priority=20"
      - "traefik.http.services.endurobuddy.loadbalancer.server.port=8000"
    networks:
      - backend
      - traefik-public

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-celery-worker
    restart: unless-stopped
    command: sh -c "cd /app/backend && celery -A config worker -l info"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_USE_HTTPS: "true"
    networks:
      - backend

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-celery-beat
    restart: unless-stopped
    command: sh -c "cd /app/backend && celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_USE_HTTPS: "true"
    networks:
      - backend

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endurobuddy-nuxt
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: /api/v1
      NUXT_PUBLIC_APP_HOST: ${TRAEFIK_APP_HOST}
    depends_on:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.endurobuddy-nuxt-http.rule=Host(`${TRAEFIK_HOST}`) || Host(`${TRAEFIK_APP_HOST}`)"
      - "traefik.http.routers.endurobuddy-nuxt-http.entrypoints=web"
      - "traefik.http.routers.endurobuddy-nuxt-http.priority=10"
      - "traefik.http.routers.endurobuddy-nuxt-http.middlewares=endurobuddy-https-redirect"
      - "traefik.http.routers.endurobuddy-nuxt.rule=Host(`${TRAEFIK_HOST}`) || Host(`${TRAEFIK_APP_HOST}`)"
      - "traefik.http.routers.endurobuddy-nuxt.entrypoints=websecure"
      - "traefik.http.routers.endurobuddy-nuxt.tls=true"
      - "traefik.http.routers.endurobuddy-nuxt.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.endurobuddy-nuxt.priority=10"
      - "traefik.http.services.endurobuddy-nuxt.loadbalancer.server.port=3000"
      # www redirect middleware (permanent 301)
      - "traefik.http.middlewares.endurobuddy-www-redirect.redirectregex.regex=^https?://www\\.${TRAEFIK_HOST}/(.*)"
      - "traefik.http.middlewares.endurobuddy-www-redirect.redirectregex.replacement=https://${TRAEFIK_HOST}/$${1}"
      - "traefik.http.middlewares.endurobuddy-www-redirect.redirectregex.permanent=true"
      # www HTTP router
      - "traefik.http.routers.endurobuddy-www-http.rule=Host(`www.${TRAEFIK_HOST}`)"
      - "traefik.http.routers.endurobuddy-www-http.entrypoints=web"
      - "traefik.http.routers.endurobuddy-www-http.priority=30"
      - "traefik.http.routers.endurobuddy-www-http.middlewares=endurobuddy-www-redirect"
      - "traefik.http.routers.endurobuddy-www-http.service=endurobuddy-nuxt"
      # www HTTPS router
      - "traefik.http.routers.endurobuddy-www.rule=Host(`www.${TRAEFIK_HOST}`)"
      - "traefik.http.routers.endurobuddy-www.entrypoints=websecure"
      - "traefik.http.routers.endurobuddy-www.tls=true"
      - "traefik.http.routers.endurobuddy-www.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.endurobuddy-www.priority=30"
      - "traefik.http.routers.endurobuddy-www.middlewares=endurobuddy-www-redirect"
      - "traefik.http.routers.endurobuddy-www.service=endurobuddy-nuxt"
    networks:
      - backend
      - traefik-public

volumes:
  endurobuddy_pgdata:
  endurobuddy_redis:

networks:
  backend:
    internal: true
  traefik-public:
    external: true
    name: proxy