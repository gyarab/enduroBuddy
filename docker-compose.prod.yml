services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: endurobuddy-redis
    restart: unless-stopped
    volumes:
      - endurobuddy_redis:/var/lib/redis/data
    networks:
      - backend
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "false"
      DJANGO_USE_HTTPS: "true"
    env_file:
      - .env
    command: ["sh", "-c", "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.endurobuddy-http.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/api/`) || PathPrefix(`/admin/`) || PathPrefix(`/static/`) || PathPrefix(`/i18n/`) || PathPrefix(`/accounts/`))"
      - "traefik.http.routers.endurobuddy-http.entrypoints=web"
      - "traefik.http.routers.endurobuddy-http.middlewares=endurobuddy-https-redirect"
      - "traefik.http.middlewares.endurobuddy-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.endurobuddy-https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.endurobuddy.rule=Host(`${TRAEFIK_HOST}`) && (PathPrefix(`/api/`) || PathPrefix(`/admin/`) || PathPrefix(`/static/`) || PathPrefix(`/i18n/`) || PathPrefix(`/accounts/`))"
      - "traefik.http.routers.endurobuddy.entrypoints=websecure"
      - "traefik.http.routers.endurobuddy.tls=true"
      - "traefik.http.routers.endurobuddy.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.endurobuddy.priority=20"
      - "traefik.http.services.endurobuddy.loadbalancer.server.port=8000"
    networks:
      - backend
      - traefik-public

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endurobuddy-nuxt
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: /api/v1
    depends_on:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.endurobuddy-nuxt-http.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.endurobuddy-nuxt-http.entrypoints=web"
      - "traefik.http.routers.endurobuddy-nuxt-http.middlewares=endurobuddy-https-redirect"
      - "traefik.http.routers.endurobuddy-nuxt.rule=Host(`${TRAEFIK_HOST}`)"
      - "traefik.http.routers.endurobuddy-nuxt.entrypoints=websecure"
      - "traefik.http.routers.endurobuddy-nuxt.tls=true"
      - "traefik.http.routers.endurobuddy-nuxt.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.endurobuddy-nuxt.priority=10"
      - "traefik.http.services.endurobuddy-nuxt.loadbalancer.server.port=3000"
    networks:
      - backend
      - traefik-public

volumes:
  endurobuddy_pgdata:
  endurobuddy_redis:

networks:
  backend:
    internal: true
  traefik-public:
    external: true
    name: proxy