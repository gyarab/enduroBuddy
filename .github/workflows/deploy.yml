name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    if: github.repository == 'vojtecholcman/enduroBuddy-private'
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Deploy
        run: |
          cd ~/apps/enduroBuddy-private
          git pull
          docker compose up -d --build
          docker compose ps