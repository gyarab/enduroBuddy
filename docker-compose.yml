services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: endurobuddy
      POSTGRES_USER: endurobuddy
      POSTGRES_PASSWORD: endurobuddy_password
    ports:
      - "5432:5432"
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"]
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  qcluster:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-qcluster
    restart: unless-stopped
    command: sh -c "cd /app/backend && python manage.py reset_stale_import_jobs && python manage.py qcluster"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endurobuddy-nuxt
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api/v1
    depends_on:
      - web
    networks:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: endurobuddy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web
      - nuxt
    networks:
      - backend

volumes:
  endurobuddy_pgdata:

networks:
  backend:
