services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-endurobuddy}
      POSTGRES_USER: ${POSTGRES_USER:-endurobuddy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-endurobuddy_password}
    ports:
      - "5432:5432"
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "false"
    env_file:
      - .env
    command: ["sh", "-c", "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"]
    networks:
      - backend

  qcluster:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-qcluster
    restart: unless-stopped
    command: sh -c "cd /app/backend && python manage.py reset_stale_import_jobs && python manage.py qcluster"
    depends_on:
      - db
      - web
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "false"
    networks:
      - backend

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endurobuddy-nuxt
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: /api/v1
    depends_on:
      - web
    networks:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: endurobuddy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web
      - nuxt
    networks:
      - backend

volumes:
  endurobuddy_pgdata:

networks:
  backend:
