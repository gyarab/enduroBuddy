services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: endurobuddy
      POSTGRES_USER: endurobuddy
      POSTGRES_PASSWORD: endurobuddy_password
    ports:
      - "5432:5432"
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"]
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  frontend:
    image: node:20-alpine
    container_name: endurobuddy-frontend
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev"
    environment:
      DJANGO_ORIGIN: "http://web:8000"
    volumes:
      - ./frontend:/app/frontend
    ports:
      - "5173:5173"
    depends_on:
      - web
    networks:
      - backend

volumes:
  endurobuddy_pgdata:

networks:
  backend:
