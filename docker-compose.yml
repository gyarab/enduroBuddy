services:
  db:
    image: postgres:16
    container_name: endurobuddy-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: endurobuddy
      POSTGRES_USER: endurobuddy
      POSTGRES_PASSWORD: endurobuddy_password
    ports:
      - "5432:5432"
    volumes:
      - endurobuddy_pgdata:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: endurobuddy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - endurobuddy_redis:/var/lib/redis/data
    networks:
      - backend
    command: redis-server --appendonly yes

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-web
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
      REDIS_URL: redis://redis:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: ["sh", "-c", "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"]
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-celery-worker
    restart: unless-stopped
    command: sh -c "cd /app/backend && celery -A config worker -l info"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: endurobuddy-celery-beat
    restart: unless-stopped
    command: sh -c "cd /app/backend && celery -A config beat -l info"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      DJANGO_DEBUG: "true"
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
    networks:
      - backend

  nuxt:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: endurobuddy-nuxt
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api/v1
      NUXT_PUBLIC_APP_HOST: app.lvh.me
    depends_on:
      - web
    networks:
      - backend

  nginx:
    build:
      context: ./nginx
    container_name: endurobuddy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - web
      - nuxt
    networks:
      - backend

volumes:
  endurobuddy_pgdata:
  endurobuddy_redis:

networks:
  backend:
