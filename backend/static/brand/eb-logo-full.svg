<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" fill="none">
  <!-- EnduroBuddy Full Logo — Stride Mark + Wordmark -->

  <!-- Stride Mark -->
  <g transform="translate(0 0)">
    <g transform="rotate(-6 32 32)">
      <rect x="18" y="14" width="14" height="5" rx="2.5" fill="#c8ff00"/>
      <rect x="18" y="29" width="22" height="5" rx="2.5" fill="#c8ff00"/>
      <rect x="18" y="44" width="30" height="5" rx="2.5" fill="#c8ff00"/>
    </g>
  </g>

  <!-- Wordmark "EnduroBuddy" in geometric sans style -->
  <text x="72" y="42" font-family="Syne, system-ui, sans-serif" font-weight="700" font-size="28" fill="#fafafa" letter-spacing="-0.5">EnduroBuddy</text>
</svg>
