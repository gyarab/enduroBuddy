  <!-- Signal Stack mark -->
  <rect x="430" y="200" width="56" height="26" rx="13" fill="#c8ff00"/>
  <rect x="430" y="238" width="98" height="26" rx="13" fill="#c8ff00" opacity="0.35"/>
  <rect x="430" y="276" width="140" height="26" rx="13" fill="#c8ff00"/>

  <!-- Wordmark -->
