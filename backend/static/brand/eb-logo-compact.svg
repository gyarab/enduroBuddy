<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 64" fill="none">
  <defs>
    <filter id="glow" x="-25%" y="-30%" width="150%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Mark -->
  <rect x="5" y="5" width="54" height="54" rx="10" stroke="#27272a" stroke-width="1.5"/>
  <polyline
    points="7,38 16,38 19,33 22,38 25,43 29,1 33,55 36,38 41,31 45,38 57,38"
    stroke="#c8ff00"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <!-- Compact wordmark -->
  <text x="72" y="42" font-family="Syne, system-ui, sans-serif" font-weight="800" font-size="30" fill="#fafafa" letter-spacing="-1">EB</text>
</svg>
