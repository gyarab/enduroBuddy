<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="rounded">
      <rect width="400" height="400" rx="80"/>
    </clipPath>
  </defs>
  <!-- Background rounded (Instagram style) -->
  <rect width="400" height="400" rx="80" fill="#09090b"/>
  <!-- Square container -->
  <rect x="80" y="80" width="240" height="240" rx="44" stroke="#27272a" stroke-width="6" clip-path="url(#rounded)"/>
  <!-- ECG pulse -->
  <polyline
    points="88,212 128,212 146,188 164,212 180,234 198,60 216,298 232,212 258,168 276,212 312,212"
    stroke="#c8ff00"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
    clip-path="url(#rounded)"
  />
</svg>
