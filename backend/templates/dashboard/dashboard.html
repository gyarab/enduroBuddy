{% extends "base.html" %}
{% block title %}Training view | EnduroBuddy{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">Training view</h4>
      <button class="btn btn-success btn-sm">Import training</button>
    </div>

    <div class="table-responsive">
      <table class="table table-striped table-sm align-middle">
        <thead class="table-dark">
          <tr>
            <th>Week</th>
            <th>Date</th>
            <th>Day</th>
            <th>Training</th>
            <th>Notes-trainer</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>I.</td>
            <td>1.1</td>
            <td>Mon</td>
            <td>2R 15–20×400m ANP, P=45s, 2V</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
{% endblock %}
