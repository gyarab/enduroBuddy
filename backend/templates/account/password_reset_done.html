{% load static i18n %}
{% get_current_language as CURRENT_LANGUAGE %}

<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Obnova hesla | EnduroBuddy</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/login.css' %}?v=8">
</head>

<body class="eb-auth">
  <div class="eb-shape eb-shape-top" aria-hidden="true"></div>
  <div class="eb-shape eb-shape-bottom" aria-hidden="true"></div>

  <main class="container eb-auth-page">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-7 col-xl-5">
        <section class="eb-shell">
          <div class="eb-card-body text-center">
            <div class="eb-mark mx-auto mb-3" aria-hidden="true">
              <svg class="eb-mark-icon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="none">
                <rect x="11" y="11" width="42" height="42" rx="14" stroke="currentColor" stroke-width="3" opacity="0.28"/>
                <path d="M18 39c0-9 7-16 16-16h12" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
                <path d="M18 30c2-7 8-11 16-11h10" stroke="currentColor" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
                <circle cx="41.5" cy="23" r="3.2" fill="currentColor"/>
                <path d="M39 40l4 4 8-8" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>

            <h1 class="eb-title mb-2">Zkontroluj e-mail</h1>
            <p class="eb-subtitle mb-4">Pokud účet s tímto e-mailem existuje, poslali jsme odkaz pro obnovu hesla.</p>

            <a class="btn eb-btn-provider py-2 w-100" href="{% url 'account_login' %}">Zpět na přihlášení</a>
          </div>
        </section>

        {% include "account/_language_switcher.html" %}
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
