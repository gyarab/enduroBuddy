{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EnduroBuddy</title>
  </head>
  <body style="margin:0;padding:0;background:#0a0a0a;color:#f5f5f5;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#0a0a0a;padding:24px 0;">
      <tr>
        <td align="center" style="padding:0 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#111111;border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:20px 24px;background:linear-gradient(180deg,#1a120d,#131313);border-bottom:1px solid #2a2a2a;">
                <div style="font-family:Segoe UI,Arial,sans-serif;font-size:22px;font-weight:800;color:#ffa464;letter-spacing:0.3px;">EnduroBuddy</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;font-family:Segoe UI,Arial,sans-serif;font-size:15px;line-height:1.6;color:#e9e9e9;">
                {% block content %}{% endblock content %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px;border-top:1px solid #2a2a2a;font-family:Segoe UI,Arial,sans-serif;font-size:13px;line-height:1.5;color:#a8a8a8;">
                
                Děkujeme, že používáte {{ current_site.name }}.<br>
                
                {{ current_site.domain }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
