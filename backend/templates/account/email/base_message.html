{% load i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EnduroBuddy</title>
  </head>
  <body style="margin:0;padding:0;background:#f8f9fa;color:#212529;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f8f9fa;padding:24px 0;">
      <tr>
        <td align="center" style="padding:0 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:620px;background:#ffffff;border:1px solid #dee2e6;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:20px 24px;background:#ffffff;border-bottom:1px solid #dee2e6;">
                <div style="font-family:Segoe UI,Arial,sans-serif;font-size:22px;font-weight:700;color:#212529;">EnduroBuddy</div>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;font-family:Segoe UI,Arial,sans-serif;font-size:15px;line-height:1.6;color:#212529;">
                {% block content %}{% endblock content %}
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px;border-top:1px solid #dee2e6;font-family:Segoe UI,Arial,sans-serif;font-size:13px;line-height:1.5;color:#6c757d;">
                Děkujeme, že používáte {{ current_site.name }}.<br>
                {{ current_site.domain }}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
