{% extends "base.html" %}

{% block title %}Odhlášení | EnduroBuddy{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:520px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h3 class="mb-3">Odhlášení</h3>
      <p class="text-muted">Opravdu se chcete odhlásit?</p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button class="btn btn-dark w-100" type="submit">Odhlásit</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
