<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-md-9 col-lg-7 col-xl-6">
      <div class="card shadow-sm border-0 eb-shell">
        <div class="card-body p-4 p-lg-5 text-center">
          <div class="small text-uppercase text-muted fw-semibold mb-2">{{ status_code }}</div>
          <h1 class="h3 mb-3">{{ title }}</h1>
          <p class="text-muted mb-4">{{ message }}</p>
          {% if debug_preview %}
            <div class="alert alert-warning text-start small mb-4" role="alert">
              Tohle je debug preview této fallback stránky. V ostrém provozu se zobrazí při skutečné HTTP chybě {{ preview_status_code }}.
            </div>
          {% endif %}
          <div class="d-grid gap-2">
            <a class="btn btn-dark" href="/">Zpět na přehled</a>
            <a class="btn btn-outline-dark" href="{% url 'account_login' %}">Přihlášení</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
