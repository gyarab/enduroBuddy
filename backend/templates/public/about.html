{% extends "public/base_public.html" %}

{% block title %}O nás | EnduroBuddy{% endblock %}

{% block page_styles %}
  <style>
    .eb-main {
      padding: 3rem 0 4rem;
    }

    .eb-card {
      padding: 40px 32px;
      border-radius: var(--eb-radius-lg);
      border: 1px solid var(--eb-line);
      background: rgba(29, 41, 36, 0.82);
      box-shadow: var(--eb-shadow-1);
      min-height: min(62vh, 560px);
      display: grid;
      align-content: center;
    }

    .eb-kicker {
      color: var(--eb-accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .eb-title {
      font-size: clamp(3.4rem, 10vw, 7rem);
      line-height: 0.95;
      margin: 0;
    }
  </style>
{% endblock %}

{% block content %}
  <main class="eb-main">
    <div class="eb-shell">
      <section class="eb-card">
        <div class="eb-kicker">O nás</div>
        <h1 class="eb-title">Soon</h1>
      </section>
    </div>
  </main>
{% endblock %}
