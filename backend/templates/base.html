{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EnduroBuddy{% endblock %}</title>

  <!-- Bootstrap (pokud ho už máš jinak, nech si svoje) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  {% block extra_head %}{% endblock %}
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">EnduroBuddy</a>

    <div class="d-flex gap-2 align-items-center">
      <a class="btn btn-sm btn-outline-dark" href="/">Training view</a>
    </div>

    <div class="ms-auto">
      {% if user.is_authenticated %}
        <form method="post" action="{% url 'account_logout' %}" class="m-0">
          {% csrf_token %}
          <button type="submit" class="btn btn-sm btn-dark">Sign out</button>
        </form>
      {% else %}
        <a class="btn btn-sm btn-outline-dark" href="{% url 'account_login' %}">Login</a>
      {% endif %}
    </div>
  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
