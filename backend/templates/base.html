{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}EnduroBuddy{% endblock %}</title>

    <!-- Bootstrap CSS (CDN) -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
    {% block head %}{% endblock %}
  </head>

  <body class="eb-page">
    <!-- TOP NAVBAR -->
    <nav class="navbar navbar-expand-lg eb-navbar border-bottom">
      <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="/">EnduroBuddy</a>

        <div class="d-flex gap-2 align-items-center">
          <a class="btn eb-navbtn" href="/">Training view</a>
          <!-- <a class="btn eb-navbtn disabled" href="#" aria-disabled="true">Statistics</a>
          <a class="btn eb-navbtn disabled" href="#" aria-disabled="true">Activities</a> -->
        </div>

        <div class="ms-auto">
          {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="m-0">
              {% csrf_token %}
              <button type="submit" class="btn eb-logoutbtn">Sign out</button>
            </form>
          {% else %}
            <a class="btn eb-navbtn" href="{% url 'login' %}">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Bootstrap JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dashboard JS -->
    <script src="{% static 'dashboard/dashboard.js' %}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
