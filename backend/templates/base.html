{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}EnduroBuddy{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- ✅ BOOTSTRAP CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >

    <!-- APP CSS -->
    <link rel="stylesheet" href="{% static 'dashboard/dashboard.css' %}">

    {% block head %}{% endblock %}
  </head>

  <body class="eb-page">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
      <div class="container-fluid px-3">
        <a class="navbar-brand fw-bold" href="/">EnduroBuddy</a>

        <div class="d-flex gap-2">
          <a class="btn btn-outline-dark btn-sm" href="/">Training view</a>
          <a class="btn btn-outline-secondary btn-sm disabled">Statistics</a>
          <a class="btn btn-outline-secondary btn-sm disabled">Activities</a>
        </div>

        <div class="ms-auto">
          {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="btn btn-outline-danger btn-sm">Logout</button>
            </form>
          {% endif %}
        </div>
      </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- ✅ BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}
  </body>
</html>
