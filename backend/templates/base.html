{% load static %}
<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}EnduroBuddy{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    {% block extra_css %}{% endblock %}
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">EnduroBuddy</a>

            {% if user.is_authenticated %}
            <div class="d-flex gap-2">
                <a class="btn btn-outline-light btn-sm" href="/">Training view</a>
                <a class="btn btn-outline-light btn-sm" href="#">Statistics</a>
                <a class="btn btn-outline-light btn-sm" href="#">Activities</a>
            </div>

            <form method="post" action="{% url 'logout' %}" class="ms-auto">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-warning btn-sm">Sign out</button>
            </form>
            {% endif %}
        </div>
    </nav>

    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
