{% load static %}
<!doctype html>
<html lang="{{ LANGUAGE_CODE|default:'cs' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnduroBuddy App</title>

  <!-- Fonts — same as public pages -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Base font/color applied immediately so body is never serif while bundle loads -->
  <style>
    body {
      margin: 0;
      background: #09090b;
      color: #fafafa;
      font-family: "Inter", "Segoe UI Variable Text", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>

  {% if debug %}
    <script type="module" src="{{ spa_vite_dev_server_url }}/@vite/client"></script>
    <script type="module" src="{{ spa_vite_dev_server_url }}/src/main.ts"></script>
  {% else %}
    <link rel="stylesheet" href="{% static spa_entry_css %}">
    <script type="module" src="{% static spa_entry_js %}"></script>
  {% endif %}
</head>
<body>
  <div id="app"></div>
</body>
</html>
